<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приключение с Тимохой!</title>
    <style>
body {
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        #game-area {
            width: 400px;
            height: 400px;
            border: 2px solid black;
            position: relative; /* Важно для позиционирования внутри */
            background-color: #f0f0f0;
        }

        /* Стиль для игрока (сейчас это див с эмодзи) */
        #player {
            width: 40px; /* Задаем размер контейнера */
            height: 40px;
            position: absolute;
            /* Центрируем эмодзи внутри контейнера */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px; /* Размер самого эмодзи */
        }

        /* Стиль для бургеров */
        .burger {
            width: 35px; /* Задаем размер контейнера */
            height: 35px;
            position: absolute;
            /* Центрируем эмодзи внутри контейнера */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px; /* Размер самого эмодзи */
        }

        #controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 5px;
        }

        #controls button {
            font-size: 24px;
            cursor: pointer;
        }
        
        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        
        #score {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
  </head>
  <body>
    <h1>Собери бургеры с Тимохой!</h1>
    <div id="game-area">
      <div id="player"><img src="photo.png" width="50px"></div>
    </div>
    <div id="controls">
      <button id="up">↑</button>
      <button id="left">←</button>
      <button id="down">↓</button>
      <button id="right">→</button>
    </div>
    <div id="score">Счет: 0</div>
    
    <script>
      const gameArea = document.getElementById('game-area');
      const playerElement = document.getElementById('player');
      const scoreElement = document.getElementById('score');
      
      const step = 20;
      const game_area_size = 400;
      const player_size = 40;
      const burger_size = 35;
      
      let score = 0;
      let playerPos = { x:0, y:0};
      
      function movePlayer(direction) {
        let newX = playerPos.x;
        let newY = playerPos.y;
        
        if (direction === 'up') newY -= step;
        if (direction === 'down') newY += step;
        if (direction === 'left') newX -= step;
        if (direction === 'right') newX += step;
        
        if (newX >= 0 && newX <= game_area_size - player_size) {
          playerPos.x = newX;
        }
        if (newY >= 0 && newY <= game_area_size - player_size) {
          playerPos.y = newY;
        }
         
        playerElement.style.left = playerPos.x + 'px';
        playerElement.style.top = playerPos.y + 'px';
        
        check();
      }
      
      function spawn() {
        const burger = document.createElement('div');
        burger.className = 'burger';
        
        burger.innerHTML = '🍔';
        
        const maxX = game_area_size - burger_size;
        const maxY = game_area_size - burger_size;
        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);
        
        burger.style.left = randomX + 'px';
        burger.style.top = randomY + 'px';
        gameArea.appendChild(burger);
      }
      
      function check() {
        const burgers = document.querySelectorAll('.burger');
        burgers.forEach(burger => {
               const burgerRect = burger.getBoundingClientRect();
               const playerRect = playerElement.getBoundingClientRect();

                if (
                    playerRect.left < burgerRect.right &&
                    playerRect.right > burgerRect.left &&
                    playerRect.top < burgerRect.bottom &&
                    playerRect.bottom > burgerRect.top
                ) {
                    score++;
                    scoreElement.textContent = 'Счет: ' + score;
                    burger.remove(); 
                }
        });
        
      }
      
      document.getElementById('up').addEventListener('click', () => movePlayer('up'));
      document.getElementById('down').addEventListener('click', () => movePlayer('down'));
      document.getElementById('left').addEventListener('click', () => movePlayer('left'));
      document.getElementById('right').addEventListener('click', () => movePlayer('right'));
      
      setInterval(spawn, 2000);
      
      spawn();
      spawn();
    </script>
  </body>
</html>
